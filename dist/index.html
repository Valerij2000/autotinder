<body class="bg-gray-100">

	<main id="app">

		<section class="min-h-screen font-sans">

			<div class="container mx-auto px-4 py-4">

				<div class="hero">
					<div class="row-hero mb-4">
						<img class="logo" src="./logo.svg" alt="Logo">
						<header class="text-center">
							<h1 class="text-3xl font-bold text-gray-800 flex justify-end items-center gap-2 mb-1">
								АвтоТиндер
								<img class="banner" src="./banner.png" alt="Banner">
							</h1>
							<p class="text-gray-600 leading-[1.5] text-right">
								Свайпайте автомобили и найдите свой идеальный вариант
							</p>
						</header>
					</div>
					<hr>
					<div class="text-center mt-4">
						<div class="text-sm text-gray-500">
							Точность определения:
							<span id="accuracy">15%</span>
						</div>
						<div class="w-full max-w-md mx-auto bg-gray-200 rounded-full h-2 mt-2">
							<div id="accuracy-bar" class="bg-green-500 h-2 rounded-full transition-all duration-500"
								style="width:15%">
							</div>
						</div>
					</div>
				</div>

				<div class="counter text-center mb-5 hidden">

					<div class="flex justify-center gap-2">


						<div>
							❤️ понравилось:
							<span class="liked-count font-bold">0</span>
						</div>

						<div>
							❌ пропущено:
							<span class="disliked-count font-bold">0</span>
						</div>

					</div>

				</div>

				<div class="card-container relative mx-auto">

					<div class="empty-state hidden">

						<div class="text-center">

							<h2 class="text-4xl font-bold mb-5">
								🎯 Мы нашли ваш идеальный автомобиль
							</h2>

							<div id="result-card"></div>

						</div>

					</div>

					<div class="swipe-badge badge-nope absolute top-10 left-5 z-50 hidden text-5xl">
						❌
					</div>

					<div class="swipe-badge badge-like absolute top-10 right-5 z-50 hidden text-5xl">
						❤️
					</div>

				</div>

				<div class="action-buttons flex justify-center gap-2 mt-2">

					<button id="dislike-btn" class="w-16 h-16 rounded-full bg-red-500 text-white text-2xl shadow-xl">
						<i class="fas fa-times"></i>
					</button>

					<button id="like-btn" class="w-16 h-16 rounded-full bg-green-500 text-white text-2xl shadow-xl">
						<i class="fas fa-heart"></i>
					</button>

					<button id="undo-btn" class="w-16 h-16 rounded-full bg-gray-700 text-white">
						<i class="fas fa-undo"></i>
					</button>

				</div>

			</div>

		</section>

	</main>

<!DOCTYPE html>
<html lang="ru">

<head>
	<load src="src/html/head/head.html" />
</head>

<body class="body">

	<main id="app">
		<section class="bg-gray-100 min-h-screen font-sans">
			<div class="container mx-auto px-4 py-8">
				<header class="text-center mb-8">
					<h1 class="text-4xl font-bold text-gray-800 mb-2">AutoTinder</h1>
					<p class="text-gray-600">Свайпайте автомобили и найдите свой идеальный вариант <i
							class="fas fa-paw ml-1 text-pink-500"></i></p>
				</header>

				<div class="text-center mb-4">
					<div class="text-sm text-gray-500">
						Точность подбора:
						<span id="accuracy">15%</span>
					</div>

					<div class="w-full bg-gray-200 rounded-full h-2 mt-2">
						<div id="accuracy-bar" class="bg-green-500 h-2 rounded-full" style="width:15%">
						</div>
					</div>
				</div>

				<div class="counter hidden">
					❤️ Купил бы:
					<span class="liked-count text-green-500">0</span> /
					❌ Не купил:
					<span class="disliked-count text-red-500">0</span>
				</div>

				<div class="card-container">
					<div class="empty-state hidden">
						<i class="fas fa-cat cat-icon"></i>
						<h3 class="text-xl font-semibold mb-2">No more adorable cats!</h3>
						<p class="text-gray-600 mb-4">You've swiped through all our lovely cats.</p>
						<button class="bg-pink-500 hover:bg-pink-600 text-white font-bold py-2 px-6 rounded-full transition">
							Find more
						</button>
					</div>

					<div class="cat-paw paw-left">
						<i class="fas fa-paw"></i>
					</div>

					<div class="cat-paw paw-right">
						<i class="fas fa-paw"></i>
					</div>

					<!-- Cards will be inserted here by JavaScript -->
				</div>

				<div class="action-buttons">
					<div class="dislike-btn" id="dislike-btn">
						<i class="fas fa-times"></i>
					</div>
					<div class="like-btn" id="like-btn">
						<i class="fas fa-heart"></i>
					</div>
				</div>

				<div class="mt-12 text-center text-gray-500">
					<p>Made with <i class="fas fa-heart text-red-400"></i> for cat lovers</p>
				</div>
			</div>
		</section>
	</main>

	<script type="module" src="src/js/main.js"></script>
</body>

</html>
